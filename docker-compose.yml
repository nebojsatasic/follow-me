version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: follow_me_app
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    command: sh -c "php artisan migrate"
    networks:
      - follow_me

  nginx:
    image: nginx:alpine
    container_name: follow_me_nginx
    ports:
      - "82:80"
    volumes:
      - ./src:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - follow_me

networks:
  follow_me:
    name: follow_me
